<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmador Real - Configuración</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; padding: 20px; }
        .box { background: #fff; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #0071e3; color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h3>Generador de Parámetros de Cuenta</h3>
    <input type="email" id="email" placeholder="Apple ID (Correo)">
    <input type="password" id="pass" placeholder="Contraseña de Aplicación">
    <input type="text" id="udid" placeholder="UDID de tu Dispositivo">
    <button onclick="guardar()">Generar config.json</button>
</div>
<script>
function guardar() {
    const obj = { apple_id: document.getElementById('email').value, password: document.getElementById('pass').value, udid: document.getElementById('udid').value };
    const blob = new Blob([JSON.stringify(obj, null, 4)], {type : 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'config.json';
    a.click();
}
</script>
</body>
</html>
