<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmador iOS Real - Panel</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f7; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
        h2 { text-align: center; color: #0071e3; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #0071e3; color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 20px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #005bb5; }
    </style>
</head>
<body>

<div class="card">
    <h2>Generador de Configuración Real</h2>
    
    <label for="appleid">Apple ID (Correo):</label>
    <input type="email" id="appleid" placeholder="ejemplo@icloud.com">

    <label for="password">Contraseña (App Password de 16 letras):</label>
    <input type="password" id="password" placeholder="abcd-efgh-ijkl-mnop">

    <label for="udid">UDID de tu iPhone:</label>
    <input type="text" id="udid" value="00008030-00120956143A802E">

    <button onclick="generarConfig()">Descargar config.json</button>
</div>

<script>
function generarConfig() {
    const data = {
        apple_id: document.getElementById('appleid').value,
        password: document.getElementById('password').value,
        udid: document.getElementById('udid').value
    };

    if(!data.apple_id || !data.password || !data.udid) {
        alert("Por favor, rellena todos los campos con tus datos legítimos.");
        return;
    }

    const jsonString = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 4));
    const downloadAnchor = document.createElement('a');
    downloadAnchor.setAttribute("href", jsonString);
    downloadAnchor.setAttribute("download", "config.json");
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
}
</script>

</body>
</html>
