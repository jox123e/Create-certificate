name: installer

on:
  push:
    paths:
      - 'config.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Repositorio
      uses: actions/checkout@v4

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Python
      run: |
        pip install requests

    - name: Iniciar Servidor Anisette Oficial (Docker)
      run: |
        docker run -d --name anisette -p 6969:6969 dadoum/anisette-v3-server
        sleep 5

    - name: Crear el Script de Extracción de Keys
      run: |
        cat << 'EOF' > script.py
        import sys
        import requests
        import json

        print('[+] Conectando al servidor Anisette local para extraer llaves...')
        
        try:
            # Solicitamos los datos reales generados por el servidor
            res = requests.get('http://localhost:6969/', timeout=10)
            data = res.json()
            
            # Formateamos el JSON de manera limpia y legible
            contenido_formateado = json.dumps(data, indent=4)
            
            # Guardamos la Key y todas las firmas dentro de un archivo TXT real
            with open("credenciales.txt", "w") as f:
                f.write("=== LLAVES DE AUTENTICACIÓN APPLE (ANISETTE DATA) ===\n\n")
                f.write(contenido_formateado)
                
            print('[+] Archivo credenciales.txt generado exitosamente con las llaves.')
            
        except Exception as e:
            print(f'[-] Error al extraer los datos del servidor: {e}')
            sys.exit(1)
        EOF

    - name: Ejecutar Script de Extracción
      run: |
        python script.py

    - name: Subir Llaves Resultantes a GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Mis-Llaves-Anisette
        path: |
          credenciales.txt
