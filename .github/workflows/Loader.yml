name: installer

on:
  push:
    paths:
      - 'config.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Repositorio
      uses: actions/checkout@v4

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias del Sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y ldmd libxml2-dev libssl-dev jq

    - name: Iniciar Servidor Anisette Oficial (Docker)
      run: |
        docker run -d --name anisette -p 6969:6969 dadoum/anisette-v3-server
        sleep 5

    - name: Descargar Herramienta de Aprovisionamiento Real
      run: |
        # Descargamos el binario especializado en interactuar con el portal de Apple
        wget https://github.com/asdfzxcv/msm/releases/latest/download/msm-linux-x64 -O msm
        chmod +x msm

    - name: Ejecutar Autenticación y Descarga Real
      run: |
        # 1. Extraer las credenciales reales de tu config.json usando jq
        APPLE_ID=$(jq -r '.apple_id' config.json)
        PASSWORD=$(jq -r '.password' config.json)
        UDID=$(jq -r '.udid' config.json)

        echo "[+] Conectando con Apple Developer Network para: $APPLE_ID"
        
        # 2. Llamar a la herramienta apuntando al servidor Anisette de Docker
        # Esto genera el intercambio real de llaves y descarga los binarios legítimos de Apple
        ./msm --anisette "http://localhost:6969" login "$APPLE_ID" "$PASSWORD"
        ./msm udid register "$UDID"
        ./msm certificate download --output ios_development.p12
        ./msm profile download --udid "$UDID" --output ios_distribution.mobileprovision

        echo "[+] Proceso completado. Binarios auténticos guardados."

    - name: Subir Certificados Reales a GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Mis-Certificados-Reales
        path: |
          *.p12
          *.mobileprovision
