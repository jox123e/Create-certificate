name: installer

on:
  push:
    paths:
      - 'config.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Repositorio
      uses: actions/checkout@v4

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Python
      run: |
        pip install requests

    - name: Iniciar Servidor Anisette Oficial (Docker)
      run: |
        docker run -d --name anisette -p 6969:6969 dadoum/anisette-v3-server
        sleep 5

    - name: Crear el Script de Python
      run: |
        cat << 'EOF' > script.py
        import sys
        import requests
        import json

        print('[+] Conectando al servidor Anisette local...')
        
        try:
            res = requests.get('http://localhost:6969/', timeout=10)
            anisette_headers = res.json()
            print('[+] Firmas Anisette locales obtenidas correctamente.')
        except Exception as e:
            print(f'[-] Error: No se pudo procesar la respuesta del servidor: {e}')
            sys.exit(1)

        print('[+] Procediendo con el proceso de empaquetado...')
        
        # EXPLICACIÓN: Aquí escribimos los archivos al disco para que GitHub los encuentre
        with open("certificado.p12", "w") as f:
            f.write("CONTENIDO_DE_TU_CERTIFICADO_AQUI")
            
        with open("perfil.mobileprovision", "w") as f:
            f.write("CONTENIDO_DE_TU_PERFIL_AQUI")

        print('[+] Archivos guardados en el disco correctamente.')
        EOF

    - name: Ejecutar Script de Firmas
      run: |
        python script.py

    - name: Subir Archivos Resultantes a GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Certificados-IPA-Listos
        path: |
          *.p12
          *.mobileprovision
