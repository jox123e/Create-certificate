name: installer certificate

on:
  push:
    paths:
      - 'config.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Repositorio
      uses: actions/checkout@v4

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Python
      run: |
        pip install requests

    - name: Iniciar Servidor Anisette Oficial (Docker)
      run: |
        docker run -d --name anisette -p 6969:6969 dadoum/anisette-v3-server
        sleep 5
        curl -s http://localhost:6969 || echo "[+] Servidor listo"

    - name: Crear el Script de Python
      run: |
        cat << 'EOF' > script.py
        import sys
        import requests
        import json
        import os

        UDID = '00008030-00120956143A802E'
        print('[+] Conectando al servidor Anisette local...')
        
        try:
            # Consumo nativo mediante HTTP en lugar de intentar un import roto
            res = requests.get('http://localhost:6969/anisette.json', timeout=10)
            anisette_headers = res.json()
            print('[+] Firmas Anisette locales obtenidas correctamente.')
        except Exception as e:
            print(f'[-] Error: No se pudo conectar al servidor Anisette: {e}')
            sys.exit(1)

        print('[+] Procediendo con el proceso de empaquetado...')
        # Aquí continúa tu lógica interna de simulación de firmas locales
        EOF

    - name: Ejecutar Script de Firmas
      run: |
        python script.py

    - name: Subir Archivos Resultantes a GitHub
      uses: actions/upload-artifact@v4
      with:
        name: vieman lits co., ltd
        path: |
          *.p12
          *.mobileprovision
