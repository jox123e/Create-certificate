name: installer

on:
  push:
    paths:
      - 'config.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Repositorio
      uses: actions/checkout@v4

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Python
      run: |
        pip install requests urllib3

    - name: Iniciar Servidor Anisette Oficial (Docker)
      run: |
        docker run -d --name anisette -p 6969:6969 dadoum/anisette-v3-server
        sleep 5

    - name: Ejecutar Procesador de Firmas Apple Bypass SSL
      run: |
        python script.py

    - name: Subir Certificados Reales a GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Certificados-IPA-Listos
        path: |
          *.p12
          *.mobileprovision
